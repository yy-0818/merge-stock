# GitHub Actions CI/CD: 自动在 Windows 云端打包 + 发布 Release
#
# 触发方式:
#   1. push 到 main 分支时自动运行
#   2. 网页上手动点击 "Run workflow" 触发
#
# 构建产物:
#   自动创建 GitHub Release (在仓库首页侧边栏直接显示)
#   下载内容: merge_stock_windows.zip (解压后运行 merge_stock.exe)
#
name: Build Windows EXE + Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # 1) 拉代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) 安装 Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3) 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      # 4) PyInstaller 打包
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm merge_stock_windows.spec

      # 5) 打包成 zip
      - name: Package as zip
        run: |
          cd dist
          powershell Compress-Archive -Path merge_stock -DestinationPath merge_stock_windows.zip -Force

      # 6) 创建 GitHub Release 并附加 zip
      #    版本号: v1.0.{run_number}，如 v1.0.1、v1.0.2 ...
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          release_name: merge_stock v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            dist/merge_stock_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
